# ============================================================================
# Secret - Mot de passe PostgreSQL
# ============================================================================
# Un Secret Kubernetes stocke les données sensibles de manière encodée
# en base64. Contrairement aux ConfigMaps, les Secrets bénéficient de :
# - Un accès restreint via RBAC (Role-Based Access Control)
# - Un stockage chiffré dans etcd (si activé)
# - Une gestion séparée du cycle de vie des applications
#
# Le mot de passe est injecté dans le pod via env.valueFrom.secretKeyRef,
# ce qui évite de stocker des secrets en clair dans les manifestes de
# Deployment ou dans les images Docker.
#
# En production, on utiliserait un outil comme Sealed Secrets ou
# HashiCorp Vault pour gérer les secrets de manière encore plus sécurisée.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: vitalsync-db-secret
  namespace: vitalsync
  labels:
    app: vitalsync
    component: database
type: Opaque
data:
  # Valeur encodée en base64 de "vitalsync_secret_2024"
  # Commande pour encoder : echo -n "vitalsync_secret_2024" | base64
  postgres-password: dml0YWxzeW5jX3NlY3JldF8yMDI0
